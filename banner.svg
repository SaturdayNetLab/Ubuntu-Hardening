<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="linegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0"/>
      <stop offset="30%" stop-color="#30363d" stop-opacity="1"/>
      <stop offset="70%" stop-color="#30363d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#238636" stop-opacity="0"/>
      <stop offset="40%" stop-color="#238636" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#238636" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid lines horizontal -->
  <line x1="0" y1="70" x2="900" y2="70" stroke="url(#linegrad)" stroke-width="0.5"/>
  <line x1="0" y1="140" x2="900" y2="140" stroke="url(#linegrad)" stroke-width="0.5"/>
  <line x1="0" y1="210" x2="900" y2="210" stroke="url(#linegrad)" stroke-width="0.5"/>

  <!-- Accent line top -->
  <line x1="0" y1="2" x2="900" y2="2" stroke="url(#accentline)" stroke-width="2"/>

  <!-- Left bracket decoration -->
  <text x="52" y="155" font-family="'Courier New', monospace" font-size="120" fill="#21262d" font-weight="bold">[</text>

  <!-- Right bracket decoration -->
  <text x="800" y="155" font-family="'Courier New', monospace" font-size="120" fill="#21262d" font-weight="bold">]</text>

  <!-- Shield / lock icon (geometric, minimal) -->
  <g transform="translate(105, 90)">
    <!-- Shield outline -->
    <path d="M30 0 L60 12 L60 38 Q60 58 30 70 Q0 58 0 38 L0 12 Z"
          fill="none" stroke="#238636" stroke-width="1.5" opacity="0.9"/>
    <!-- Shield fill subtle -->
    <path d="M30 0 L60 12 L60 38 Q60 58 30 70 Q0 58 0 38 L0 12 Z"
          fill="#238636" opacity="0.06"/>
    <!-- Lock body -->
    <rect x="18" y="34" width="24" height="18" rx="3"
          fill="none" stroke="#238636" stroke-width="1.5" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M22 34 L22 27 Q22 20 30 20 Q38 20 38 27 L38 34"
          fill="none" stroke="#238636" stroke-width="1.5" opacity="0.9" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="30" cy="42" r="3" fill="#238636" opacity="0.8"/>
    <rect x="28.5" y="44" width="3" height="5" rx="1" fill="#238636" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="200" y="118"
        font-family="'Courier New', monospace"
        font-size="38"
        font-weight="bold"
        fill="#e6edf3"
        letter-spacing="-0.5">ubuntu-hardening.sh</text>

  <!-- Subtitle -->
  <text x="200" y="155"
        font-family="'Courier New', monospace"
        font-size="15"
        fill="#8b949e"
        letter-spacing="0.5">First-Install Security Script for Ubuntu 24.04 LTS</text>

  <!-- Divider line -->
  <line x1="200" y1="172" x2="750" y2="172" stroke="#30363d" stroke-width="0.8"/>

  <!-- Tags row -->
  <!-- Tag 1: bash -->
  <rect x="200" y="186" width="58" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="229" y="201" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">bash</text>

  <!-- Tag 2: ubuntu -->
  <rect x="268" y="186" width="72" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="304" y="201" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">ubuntu</text>

  <!-- Tag 3: security -->
  <rect x="350" y="186" width="78" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="389" y="201" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">security</text>

  <!-- Tag 4: hardening — green accent -->
  <rect x="438" y="186" width="84" height="22" rx="4" fill="#0d2818" stroke="#238636" stroke-width="1"/>
  <text x="480" y="201" font-family="'Courier New', monospace" font-size="11" fill="#3fb950" text-anchor="middle">hardening</text>

  <!-- Tag 5: 3NET GmbH -->
  <rect x="532" y="186" width="90" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="577" y="201" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">3NET GmbH</text>

  <!-- Bottom right: subtle version/status -->
  <text x="845" y="258"
        font-family="'Courier New', monospace"
        font-size="11"
        fill="#30363d"
        text-anchor="end">v1.0</text>

  <!-- Corner dots decoration -->
  <circle cx="18" cy="18" r="4" fill="#ff5f57" opacity="0.7"/>
  <circle cx="34" cy="18" r="4" fill="#febc2e" opacity="0.7"/>
  <circle cx="50" cy="18" r="4" fill="#28c840" opacity="0.7"/>

  <!-- Bottom accent line -->
  <line x1="0" y1="278" x2="900" y2="278" stroke="url(#accentline)" stroke-width="1.5"/>
</svg>
